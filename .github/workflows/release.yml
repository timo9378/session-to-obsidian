name: release
# 推一個版本 tag(例如 v0.1.0)就自動 build + 發佈到 PyPI。
# 用 PyPI Trusted Publishing(OIDC),不需要任何 token/secret。
on:
  push:
    tags: ["v*"]
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Trusted Publishing 需要;PyPI 用它驗證身分,免 token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
